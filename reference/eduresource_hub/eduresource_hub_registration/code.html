<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#280072",
              "secondary-fixed-dim": "#86cbff",
              "primary-dim": "#7e51ff",
              "on-surface-variant": "#aaaab7",
              "surface-bright": "#282b3a",
              "on-error": "#490013",
              "surface-tint": "#b6a0ff",
              "surface-container-lowest": "#000000",
              "primary-fixed": "#a98fff",
              "inverse-on-surface": "#53545f",
              "secondary-container": "#006493",
              "outline-variant": "#464752",
              "on-tertiary-fixed": "#380014",
              "surface-container-highest": "#222532",
              "surface-container": "#171924",
              "on-primary": "#340090",
              "on-secondary-container": "#f3f8ff",
              "surface-container-high": "#1c1f2b",
              "on-tertiary": "#48001c",
              "tertiary-container": "#fd3e80",
              "inverse-surface": "#faf8ff",
              "surface-container-low": "#11131d",
              "secondary-dim": "#00a7f2",
              "surface-variant": "#222532",
              "surface-dim": "#0c0e17",
              "on-surface": "#f0f0fd",
              "on-error-container": "#ffb2b9",
              "on-background": "#f0f0fd",
              "secondary-fixed": "#a7d7ff",
              "error": "#ff6e84",
              "error-dim": "#d73357",
              "tertiary-fixed-dim": "#ff769b",
              "outline": "#737580",
              "on-tertiary-container": "#100003",
              "on-tertiary-fixed-variant": "#770033",
              "on-secondary-fixed": "#003855",
              "surface": "#0c0e17",
              "secondary": "#00affe",
              "primary": "#b6a0ff",
              "tertiary-fixed": "#ff8fa9",
              "primary-container": "#a98fff",
              "tertiary-dim": "#ff6c95",
              "on-primary-fixed-variant": "#32008a",
              "on-secondary": "#002a42",
              "error-container": "#a70138",
              "inverse-primary": "#6834eb",
              "primary-fixed-dim": "#9c7eff",
              "background": "#0c0e17",
              "on-secondary-fixed-variant": "#00567f",
              "tertiary": "#ff6c95",
              "on-primary-fixed": "#000000"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .glass-specular {
            border-top: 1px solid rgba(115, 117, 128, 0.15);
            border-left: 1px solid rgba(115, 117, 128, 0.15);
        }
        .deep-bloom {
            box-shadow: 0px 24px 48px rgba(0, 0, 0, 0.6);
        }
        .text-glow:hover {
            text-shadow: 0 0 8px rgba(182, 160, 255, 0.4);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary/30 min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Bar - Note: Shared Component Logic applied for suppression on transactional pages, but keeping minimal Hub identity -->
<header class="fixed top-0 w-full z-50 bg-surface/60 backdrop-blur-xl px-8 py-6 flex justify-between items-center">
<div class="text-2xl font-bold tracking-tighter text-on-surface font-headline">
            EduResource Hub
        </div>
<div class="hidden md:flex gap-8">
<a class="text-sm font-label tracking-tight text-on-surface/70 hover:text-primary transition-colors" href="#">Resources</a>
<a class="text-sm font-label tracking-tight text-on-surface/70 hover:text-primary transition-colors" href="#">Support</a>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-6 relative">
<!-- Atmospheric Background Element -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Registration Card Container -->
<div class="relative w-full max-w-[580px] z-10">
<!-- Large Glassmorphic Card -->
<div class="bg-surface-variant/40 backdrop-blur-[40px] rounded-[2rem] p-10 md:p-16 glass-specular deep-bloom border border-outline-variant/10">
<!-- Header Section -->
<div class="mb-12">
<span class="label-md text-primary font-bold tracking-[0.15em] uppercase text-[10px] mb-3 block">Digital Curator Access</span>
<h1 class="font-headline text-4xl md:text-5xl font-extrabold text-on-surface tracking-tight leading-tight">
                        Begin Your Academic Journey
                    </h1>
</div>
<!-- Registration Form -->
<form class="space-y-8">
<!-- Role Selector - Elegant Custom Toggle -->
<div class="space-y-4">
<label class="text-xs font-semibold text-on-surface-variant tracking-wider uppercase ml-1">Select Identity</label>
<div class="grid grid-cols-2 p-1 bg-surface-container-lowest rounded-xl border border-outline-variant/15">
<label class="relative flex items-center justify-center px-4 py-3 cursor-pointer group">
<input checked="" class="peer sr-only" name="role" type="radio" value="student"/>
<div class="absolute inset-0 rounded-lg transition-all duration-300 peer-checked:bg-surface-container-high peer-checked:shadow-sm"></div>
<div class="relative flex items-center gap-3 transition-colors peer-checked:text-primary text-on-surface-variant">
<span class="material-symbols-outlined text-xl">school</span>
<span class="font-semibold text-sm">Student</span>
</div>
</label>
<label class="relative flex items-center justify-center px-4 py-3 cursor-pointer group">
<input class="peer sr-only" name="role" type="radio" value="faculty"/>
<div class="absolute inset-0 rounded-lg transition-all duration-300 peer-checked:bg-surface-container-high peer-checked:shadow-sm"></div>
<div class="relative flex items-center gap-3 transition-colors peer-checked:text-primary text-on-surface-variant">
<span class="material-symbols-outlined text-xl">history_edu</span>
<span class="font-semibold text-sm">Faculty</span>
</div>
</label>
</div>
</div>
<div class="space-y-6">
<!-- Email Field -->
<div class="relative group">
<label class="text-xs font-semibold text-on-surface-variant tracking-wider uppercase ml-1 mb-2 block" for="email">Institutional Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary">
                                    drafts
                                </span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all font-body" id="email" placeholder="name@university.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="relative group">
<label class="text-xs font-semibold text-on-surface-variant tracking-wider uppercase ml-1 mb-2 block" for="password">Secure Keyphrase</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary">
                                    lock
                                </span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all font-body" id="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 px-1">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded bg-surface-container-lowest border-outline-variant/30 text-primary focus:ring-primary focus:ring-offset-surface" id="terms" type="checkbox"/>
</div>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                            I acknowledge the <a class="text-primary hover:underline" href="#">Academic Integrity</a> guidelines and the <a class="text-primary hover:underline" href="#">Terms of Curation</a>.
                        </label>
</div>
<!-- CTA Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-headline font-bold py-5 rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 relative group overflow-hidden" type="submit">
<span class="relative z-10 flex items-center justify-center gap-2">
                            Create Account
                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</form>
<!-- Footer Links Inside Card -->
<div class="mt-12 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-sm text-on-surface-variant">
                        Already a member? 
                        <a class="text-secondary font-bold hover:text-secondary-fixed transition-colors ml-1 inline-flex items-center gap-1 group" href="#">
                            Sign In
                            <span class="material-symbols-outlined text-sm group-hover:translate-x-0.5 transition-transform">login</span>
</a>
</p>
</div>
</div>
<!-- Contextual Social Proof / Info -->
<div class="mt-8 px-6 flex justify-between items-center text-[10px] text-on-surface-variant/40 tracking-[0.2em] uppercase font-bold">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
                    Secure Encryption
                </div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-tertiary"></span>
                    Verified Institutions
                </div>
</div>
</div>
</main>
<!-- Page Footer -->
<footer class="w-full py-12 px-8 border-t border-outline-variant/15 bg-surface-container flex flex-col md:flex-row justify-between items-center gap-6 mt-auto">
<div class="text-lg font-black text-on-surface font-headline">EduResource Hub</div>
<div class="flex flex-wrap justify-center gap-8 text-[10px] font-label tracking-widest uppercase text-on-surface/50">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
<div class="text-[10px] font-label tracking-widest uppercase text-on-surface/30">
            © 2024 EDUHUB. THE DIGITAL CURATOR.
        </div>
</footer>
</body></html>
